name: Build And Release Binaries

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build Linux amd64 binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o "dist/freedrive-linux-amd64" ./cmd/freedrive

      - name: Build Windows amd64 exe
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o "dist/freedrive-windows-amd64.exe" ./cmd/freedrive

      - name: Generate checksums
        run: |
          cd dist
          sha256sum freedrive-linux-amd64 freedrive-windows-amd64.exe > checksums.txt

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: FreeDrive ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/freedrive-linux-amd64
            dist/freedrive-windows-amd64.exe
            dist/checksums.txt
