services:
  freedrive:
    build:
      context: .
      dockerfile: Dockerfile
    image: marcinx98x/freedrive:latest
    container_name: freedrive
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "${FREEDRIVE_PORT:-8080}:8080"
    environment:
      FREEDRIVE_PORT: 8080
      FREEDRIVE_DATA_DIR: /app/data
      FREEDRIVE_JWT_SECRET: ${FREEDRIVE_JWT_SECRET:-}
      FREEDRIVE_MAX_UPLOAD_MB: ${FREEDRIVE_MAX_UPLOAD_MB:-5120}
      FREEDRIVE_ADMIN_EMAIL: ${FREEDRIVE_ADMIN_EMAIL:-admin@freedrive.local}
      FREEDRIVE_ADMIN_PASSWORD: ${FREEDRIVE_ADMIN_PASSWORD:-admin123}
    volumes:
      - freedrive-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --cleanup --label-enable --interval 3600
    environment:
      TZ: ${TZ:-Europe/Warsaw}

volumes:
  freedrive-data:
